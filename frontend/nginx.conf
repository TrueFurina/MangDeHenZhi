server {
    listen 80;
    server_name localhost;

    # ===== 安全头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # 注意：HSTS 仅在 HTTPS(443) 下有效，纯 HTTP 下浏览器会忽略，故此处不再声明。
    # 启用 TLS 后请见 nginx.tls.example.conf，在 443 server 块中设置 Strict-Transport-Security。
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self' data:;
        connect-src 'self' http://backend:8080;
        frame-ancestors 'none';
    " always;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";

    root /usr/share/nginx/html;
    index index.html;

    # ===== API 反向代理 =====
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ===== SPA 路由 =====
    location / {
        try_files $uri $uri/ /index.html;

        # 禁止搜索引擎索引 SPA 路径
        if ($args ~ "^$") {
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ===== 静态资源缓存 =====
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===== 禁止访问敏感文件 =====
    location ~* \.(env|git|yml|yaml|log|md|json|lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== 自定义错误页面 =====
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}