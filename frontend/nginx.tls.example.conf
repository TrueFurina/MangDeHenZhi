# ============================================================
# 芒得很职 前端 Nginx — TLS 终止示例配置（F-008 / F-026 修复参考）
# ------------------------------------------------------------
# 用法：
#   1) 将证书置于 ./certs/fullchain.pem 与 ./certs/privkey.pem
#   2) 复制本文件为 nginx.conf（或 include 进主配置），并删除原 HTTP-only 的 nginx.conf
#   3) 重新构建前端镜像：docker compose build frontend && docker compose up -d
# 说明：当前默认 docker-compose 仅暴露 80(HTTP)。要消除 F-008（明文传输）必须在
#       边缘（本 Nginx 或前置 LB/Cloudflare）终止 TLS；内部服务间流量仍在容器网络内。
# ============================================================

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name localhost;

    # 仅做 ACME/健康探针等例外，其余全部 301 到 HTTPS
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS（TLS 终止）
server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ===== 安全头（含仅在 HTTPS 下有效的 HSTS，F-026 修复）=====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self' data:;
        connect-src 'self' http://backend:8080;
        frame-ancestors 'none';
    " always;

    root /usr/share/nginx/html;
    index index.html;

    # API 反向代理（后端容器间通过 http 通信，TLS 已在此终止）
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(env|git|yml|yaml|log|md|json|lock)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
