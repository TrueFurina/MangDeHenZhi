spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/mangdehenzhi?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&connectTimeout=3000&socketTimeout=30000
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: false

# JWT：生产环境必须从环境变量注入强随机密钥，不提供默认值（缺失则启动失败）
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000