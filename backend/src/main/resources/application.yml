spring:
  application:
    name: mangdehenzhi-backend

  # 默认使用 H2 内存数据库（开发方便）
  datasource:
    url: jdbc:h2:mem:mangdehenzhi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

# JWT 配置
# 生产环境（prod profile）必须在环境变量中提供强随机 JWT_SECRET，缺失即启动失败（见 application-prod.yml）。
# 以下仅为本地开发便利的占位密钥，严禁用于生产部署。
jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-do-not-use-in-prod-please-override}
  expiration: 86400000  # 24小时