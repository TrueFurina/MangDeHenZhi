# ============================================================
# GitHub Actions CI — 芒德矩阵 持续集成工作流
# ============================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---- 后端 ----
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 编译后端
        run: ./mvnw compile -q

      - name: 运行后端测试
        run: ./mvnw test

      - name: 打包后端
        run: ./mvnw package -DskipTests -B

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ---- 前端 ----
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npx vue-tsc --noEmit

      - name: 运行前端测试
        run: npm run test

      - name: 构建前端
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ---- Docker 构建 ----
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: 下载后端构建产物
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 构建 Docker 镜像
        run: |
          docker compose build

      - name: 冒烟测试（启动容器并校验健康/首页）
        run: |
          docker compose up -d
          # 等待前台(Nginx)与后端健康探针就绪（经 :80 反代到 /api/health）
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:80/ >/dev/null 2>&1 && \
               curl -fsS http://localhost:80/api/health >/dev/null 2>&1; then
              echo "✅ 冒烟通过：首页与 /api/health 均可访问"
              break
            fi
            echo "⏳ 等待服务就绪 ($i/30)..."
            sleep 5
          done
          echo "--- /api/health ---"; curl -fsS http://localhost:80/api/health || true
          echo "--- 首页 HTTP 状态 ---"; curl -o /dev/null -w "%{http_code}\n" http://localhost:80/ || true
          docker compose down -v

      - name: 镜像列表
        run: docker images